<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RELIABLE COMPUTECH</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

 
  <h1>RELIABLE COMPUTECH</h1>
<button id="addBtn" style="display:none;">Add Customer</button>
<button id="viewBtn" style="display:none;">View Customers</button>
  <div id="addCustomerSection" style="display:none;">
    <form id="customerForm">

      <div class="row">
        <input type="text" id="name" placeholder="Customer Name" required>
        <input type="email" id="email" placeholder="Email">
      </div>

      <div class="row">
        <input type="text" id="phone" placeholder="Phone Number" required>
        <input type="text" id="address" placeholder="Address">
      </div>

      <input type="text" id="description" placeholder="Description">

      <div class="row">
        <input type="text" id="status" placeholder="Status">
        <input type="text" id="estimate" placeholder="Estimate">
      </div>

      <label for="photo" class="upload-btn">Upload Photo</label>
      <input type="file" id="photo" hidden>
      <span id="fileName">No file selected</span>

      <button type="submit">Save Customer</button>

    </form>
  </div>

  <div id="message"></div>

  <input type="text" id="searchInput"
         placeholder="Search by Name or Phone"
         style="display:none;">

  <div id="customerSection" style="display:none;">
    <h2 id="customerCountHeading">Customers (0)</h2>

    <table id="customerTable">
      <thead>
        <tr>
          <th>Photo</th>
          <th>Name</th>
          <th>Contact</th>
          <th>Description</th>
          <th>Status</th>
          <th>Estimate</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="customerBody"></tbody>
    </table>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
<div id="customPopup" class="popup-overlay">

    <div class="popup-box">

        <h3>RELIABLE COMPUTECH</h3>

        <p id="popupMessage"></p>

        <input 
        id="popupPassword" 
        type="password" 
        placeholder="Enter Password">

        <div class="popup-buttons">

            <button id="popupCancel">
                Cancel
            </button>

            <button id="popupOK">
                OK
            </button>

        </div>

    </div>

</div>

</body>
</html>
