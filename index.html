<!DOCTYPE html>
<html>
<head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RELIABLE COMPUTECH</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<script>
if (sessionStorage.getItem("loggedIn") !== "yes") {

    let password = prompt("Enter Password");

    while (password !== "computech123") {
        alert("Wrong Password!");
        password = prompt("Enter Password");
    }

    sessionStorage.setItem("loggedIn", "yes");
}
</script>
<h1>RELIABLE COMPUTECH</h1>
    <button id="addBtn">Add Customer</button>
<button id="viewBtn">View Customers</button>
<div id="addCustomerSection" style="display:none;">
<form id="customerForm">
    <input type="text" id="name" placeholder="Customer Name" required>
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="phone" placeholder="Phone Number" required>
    <input type="text" id="address" placeholder="Address">
    <label for="photo" class="upload-btn">Upload Photo</label>
<input type="file" id="photo" hidden>
<span id="fileName">No file selected</span>

    <button type="submit">Save Customer</button>
</form>
    </div>

<div id="message"></div>

<input type="text" id="searchInput"
       placeholder="Search by Name or Phone"
       style="display:none;">
<div id="customerSection" style="display:none;">
    <h2 id="customerCountHeading">Customers (0)</h2>

    <table id="customerTable">
      <thead>
        <tr>
          <th>Photo</th>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Address</th>
            <th>Action</th>
        </tr>
      </thead>
      <tbody id="customerBody">
      </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
